name: Telegram market digest

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Send Conviction market digest
        env:
          CORE_API_URL: ${{ secrets.CORE_API_URL }}
          CORE_CRON_SECRET: ${{ secrets.CORE_CRON_SECRET }}
        run: |
          if [ -z "$CORE_API_URL" ]; then
            echo "CORE_API_URL secret is missing"
            exit 1
          fi
          if [ -z "$CORE_CRON_SECRET" ]; then
            echo "CORE_CRON_SECRET secret is missing"
            exit 1
          fi
          curl --fail --show-error --silent \
            -H "Authorization: Bearer $CORE_CRON_SECRET" \
            "$CORE_API_URL/telegram/market-digest"
